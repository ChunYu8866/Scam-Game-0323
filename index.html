<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>午夜委託 - 沉浸式通訊解謎</title>
  <meta name="description" content="午夜委託：沉浸式防詐騙互動故事遊戲。體驗真實詐騙情境，測試你的防詐意識。">
  <meta property="og:title" content="午夜委託 - 沉浸式通訊解謎">
  <meta property="og:description" content="你能識破詐騙集團的陷阱嗎？體驗真實的詐騙情境，學會保護自己。">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #000;
      color: #fff;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
    }

    /* ---------------- 動畫庫 ---------------- */
    @keyframes slow-pan {
      0% {
        transform: scale(1) translate(0, 0);
      }

      50% {
        transform: scale(1.05) translate(-1%, -1%);
      }

      100% {
        transform: scale(1) translate(0, 0);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-3px);
      }

      75% {
        transform: translateX(3px);
      }
    }

    /* 訊息彈出效果 (帶有物理回彈感) */
    @keyframes message-pop {
      0% {
        opacity: 0;
        transform: translateY(15px) scale(0.95);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* 推播通知下拉效果 */
    @keyframes notify-drop {
      0% {
        transform: translateY(-150%);
        opacity: 0;
      }

      10% {
        transform: translateY(0);
        opacity: 1;
      }

      90% {
        transform: translateY(0);
        opacity: 1;
      }

      100% {
        transform: translateY(-150%);
        opacity: 0;
      }
    }

    /* 打字點點動畫 */
    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
      }

      40% {
        transform: translateY(-4px);
      }
    }

    .animate-slow-pan {
      animation: slow-pan 25s ease-in-out infinite alternate;
    }

    .animate-shake {
      animation: shake 0.2s ease-in-out 2;
    }

    .msg-pop {
      animation: message-pop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .notify-anim {
      animation: notify-drop 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      background-color: #9ca3af;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    /* 隱藏原生捲軸，但保留捲動功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scanlines {
      background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNCIgaGVpZ2h0PSI0IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiLz48L3N2Zz4=');
    }

    /* 手機聽筒瀏海設計 */
    .iphone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 25px;
      background-color: #000;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      z-index: 100;
    }
  </style>
</head>

<body class="flex items-center justify-center min-h-[100dvh]">

  <div id="phone-frame"

    <div class="hidden md:block iphone-notch"></div>

    <div class="absolute inset-0 z-0 pointer-events-none">

      <button onclick="startGame()"

    <div id="playing-view" class="absolute inset-0 flex flex-col z-10 hidden">

    <div id="ending-view"

                        </div>
                    </div>`;
      } else if (speaker === '系統') {
        html = `
                    <div class="flex justify-center w-full my-4 animate-fade-in">
                        <div class="bg-gray-800/80 text-gray-300 text-[12px] px-4 py-2 rounded-lg border border-gray-700 backdrop-blur-md max-w-[85%] text-center leading-relaxed">
                            ${text}
                        </div>
                    </div>`;
      } else {
        const avatar = speaker.includes('阿杰')
          ? `<img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&auto=format&fit=crop&q=60" class="w-7 h-7 rounded-full object-cover shrink-0">`
          : `<div class="w-7 h-7 bg-gray-700 rounded-full flex items-center justify-center shrink-0"><i data-lucide="user" class="w-4 h-4 text-gray-400"></i></div>`;

        html = `
                    <div class="flex items-end gap-2 w-full my-1.5 pl-2 pr-12 msg-pop">
                        ${avatar}
                        <div class="bg-[#27272a] text-white px-3.5 py-2.5 rounded-2xl rounded-bl-sm border border-white/5 shadow-sm text-[15px] leading-relaxed">
                            ${contentHTML}
                        </div>
                        <span class="text-[9px] text-gray-500 mb-1">${timeStr}</span>
                    </div>`;
      }

      document.getElementById('scroll-anchor').insertAdjacentHTML('beforebegin', html);
      lucide.createIcons();
      scrollToBottom();

      // 如果是發送的訊息，模擬「已讀」延遲
      if (type === 'outgoing') {
        setTimeout(() => {
          const readEl = document.getElementById(`${bubbleId}-read`);
          if (readEl) readEl.classList.remove('opacity-0');
        }, 800 + Math.random() * 500); // 0.8s ~ 1.3s 後顯示已讀
      }
    }

    // QTE 計時器
    function startTimer(duration, timeoutNext) {
      const bar = document.getElementById('timer-bar-fill');
      const container = document.getElementById('timer-container');
      const alertBox = document.getElementById('qte-alert');

      container.classList.remove('hidden');
      alertBox.classList.remove('hidden');
      alertBox.classList.add('flex');

      qteTimeoutNext = timeoutNext;
      let start = Date.now();
      let end = start + duration * 1000;

      function tick() {
        let now = Date.now();
        let remaining = Math.max(0, end - now);
        let percentage = (remaining / (duration * 1000)) * 100;
        bar.style.width = percentage + '%';

        if (remaining > 0) {
          qteAnimationId = requestAnimationFrame(tick);
        } else {
          stopTimer();
          handleOptionSelect(qteTimeoutNext, null);
        }
      }
      qteAnimationId = requestAnimationFrame(tick);
    }

    function stopTimer() {
      cancelAnimationFrame(qteAnimationId);
      document.getElementById('timer-container').classList.add('hidden');
      document.getElementById('qte-alert').classList.add('hidden');
      document.getElementById('qte-alert').classList.remove('flex');
    }

    // 渲染主循環
    async function renderNode(nodeId) {
      currentNodeId = nodeId;
      const node = STORY[nodeId];

      if (!node && ENDINGS[nodeId]) {
        renderEnding(nodeId);
        return;
      }

      // 更新背景與震動（只在圖片真的不同時才更新，避免無謂重繪）
      const bgEl = document.getElementById('scene-bg');
      const newBg = `url('${node.bg}')`;
      if (bgEl.style.backgroundImage !== newBg) {
        bgEl.style.backgroundImage = newBg;
      }
      if (node.effect === 'shake') {
        document.getElementById('phone-frame').classList.remove('animate-shake');
        void document.getElementById('phone-frame').offsetWidth; // restart anim
        document.getElementById('phone-frame').classList.add('animate-shake');
      }

      updateChatHeader(node.speaker);

      // 推進時間 (每句對話過 0~2 分鐘)
      currentMinutes += Math.floor(Math.random() * 3);

      // 打字與顯示
      await showTypingIndicator(node.speaker);
      appendBubble(node.speaker, node.text, 'incoming');

      // 準備選項面板
      const optionsArea = document.getElementById('options-area');
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';

      if (node.options) {
        // 保持原始選項順序，確保敘事邏輯連貫
        node.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = "w-full bg-[#27272a] hover:bg-[#3f3f46] text-white border border-white/5 p-3.5 rounded-xl text-[14.5px] font-medium tracking-wide transition-colors text-center active:scale-[0.98] shadow-sm";
          btn.innerText = opt.text;
          btn.onclick = () => handleOptionSelect(opt.next, opt.text);
          optionsContainer.appendChild(btn);
        });
      }

      // 滑出選項面板並確保捲動到底部
      optionsArea.classList.remove('translate-y-full');
      scrollToBottom();

      if (node.timeLimit) {
        startTimer(node.timeLimit, node.timeoutNext);
      }
      isTransitioning = false;
    }

    function handleOptionSelect(nextId, optionText) {
      if (isTransitioning) return;
      isTransitioning = true;
      stopTimer();

      // 滑下收起選項面板
      const optionsArea = document.getElementById('options-area');
      optionsArea.classList.add('translate-y-full');

      if (optionText) {
        appendBubble('我', optionText, 'outgoing');
      }

      // 留時間給「已讀」動畫跑完再進入下一節點
      setTimeout(() => {
        renderNode(nextId);
      }, 1800);
    }

    function renderEnding(endingId) {
      const ending = ENDINGS[endingId];
      document.getElementById('ending-title').innerText = ending.title;
      document.getElementById('ending-content').innerText = ending.content;
      document.getElementById('ending-analysis').innerText = ending.analysis;

      const legalContainer = document.getElementById('legal-container');
      if (ending.legal) {
        legalContainer.classList.remove('hidden');
        document.getElementById('ending-legal').innerText = ending.legal;
      }

      const adviceContainer = document.getElementById('advice-container');
      if (ending.advice) {
        adviceContainer.classList.remove('hidden');
        document.getElementById('ending-advice').innerText = ending.advice;
      }

      // ✅ 回傳成果資料到 Google Sheets
      if (SHEET_URL && !SHEET_URL.includes('請貼上')) {
        const durationSec = gameStartTime ? Math.round((Date.now() - gameStartTime) / 1000) : 0;
        const rankMatch = ending.analysis.match(/【(?:防禦力\s?)?(.*?)(?:\s?級)?】/);
        const defenseRank = rankMatch ? rankMatch[1].trim() : '未知';

        fetch(SHEET_URL, {
          method: 'POST',
          body: JSON.stringify({
            endingId: endingId,
            endingTitle: ending.title,
            defenseRank: defenseRank,
            durationSec: durationSec,
            userId: generateUID()
          })
        }).catch(() => { }); // 靜默失敗，不影響遊戲
      }

      setTimeout(() => { setView('ending-view'); }, 1000);
    }

    // 分享結局功能（支援 Web Share API，不支援則複製到剪貼簿）
    function shareEnding() {
      const title = document.getElementById('ending-title').innerText;
      const shareData = {
        title: '午夜委託 - 沉浸式通訊解謎',
        text: `我在「午夜委託」中的結局是：${title}\n你能識破詐騙集團的陷阱嗎？`,
        url: location.href
      };
      if (navigator.share) {
        navigator.share(shareData).catch(() => { });
      } else {
        const text = `${shareData.text}\n${shareData.url}`;
        navigator.clipboard.writeText(text).then(() => {
          alert('已複製到剪貼簿！可貼上分享給朋友。');
        }).catch(() => {
          alert('請手動複製連結分享：' + location.href);
        });
      }
    }

    // 產生/取得匿名使用者 ID（存於 localStorage）
    function generateUID() {
      let uid = localStorage.getItem('game_uid');
      if (!uid) {
        uid = 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('game_uid', uid);
      }
      return uid;
    }

    // 初始化
    setView('menu-view');
  </script>
</body>

</html>
